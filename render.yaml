services:
  - type: web
    name: sp-slack-integration
    runtime: node
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: BASE_URL
        sync: false        # set in Render dashboard
      - key: SP_APP_ID
        sync: false
      - key: SP_APP_SECRET
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/data/sp_slack.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
